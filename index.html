<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>r/place · collaborative pixel canvas</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            background: #0a0c12;
            color: #f0f0f0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Roboto', sans-serif;
        }

        /* UI Panel - modern glassmorph */
        #ui {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(28, 32, 44, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            pointer-events: auto;
            font-weight: 500;
        }

        .left-group {
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(0,0,0,0.4);
            padding: 5px 16px;
            border-radius: 60px;
        }

        .color-picker-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1e1f2c;
            padding: 4px 12px;
            border-radius: 40px;
        }

        .color-picker-wrap label {
            font-size: 1.2rem;
        }

        #colorPicker {
            width: 42px;
            height: 42px;
            border: 2px solid white;
            border-radius: 50%;
            cursor: pointer;
            background: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: transform 0.1s ease;
        }
        #colorPicker:active {
            transform: scale(0.95);
        }

        #cooldown {
            background: #1f2937;
            padding: 8px 20px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.2), 0 2px 6px rgba(0,0,0,0.2);
            transition: all 0.2s;
            min-width: 150px;
            text-align: center;
        }
        #cooldown.ready {
            background: #2b6e3c;
            color: white;
            text-shadow: 0 0 2px #a0ffa0;
            box-shadow: 0 0 8px #2ecc71;
        }
        #cooldown.wait {
            background: #7f2e2e;
            color: #ffc9c9;
        }

        .info-badge {
            background: #0f172ad9;
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 400;
        }

        button {
            background: #3b4b6e;
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.1s;
        }
        button:active {
            background: #1f2a44;
            transform: scale(0.96);
        }

        canvas {
            display: block;
            cursor: grab;
        }

        canvas:active {
            cursor: grabbing;
        }

        @media (max-width: 640px) {
            #ui {
                bottom: 12px;
                left: 12px;
                right: 12px;
                padding: 10px 14px;
            }
            .left-group {
                gap: 10px;
                padding: 4px 12px;
            }
            #colorPicker {
                width: 36px;
                height: 36px;
            }
            #cooldown {
                padding: 5px 16px;
                font-size: 1rem;
                min-width: 120px;
            }
            .info-badge {
                font-size: 0.7rem;
                padding: 4px 12px;
            }
        }
    </style>
</head>
<body>

<div id="ui">
    <div class="left-group">
        <div class="color-picker-wrap">
            <span>🎨</span>
            <input type="color" id="colorPicker" value="#FF3B3F">
        </div>
        <div class="info-badge">
            <span>🖱️</span> click pixel
        </div>
    </div>
    <div id="cooldown" class="ready">✨ READY</div>
</div>

<canvas id="board"></canvas>

<script>
    (function(){
        // ---------- CONFIG ----------
        const SIZE = 50;               // 50x50 grid
        const BASE_PIXEL = 20;         // base pixel size in px at scale=1
        const COOLDOWN_MS = 5000;      // 5 seconds cooldown (fully working)

        // DOM elements
        const canvas = document.getElementById("board");
        const ctx = canvas.getContext("2d");
        const colorPicker = document.getElementById("colorPicker");
        const cooldownDiv = document.getElementById("cooldown");

        // Canvas transform state
        let scale = 1;
        let offsetX = 0;
        let offsetY = 0;

        // Pixel data { "x_y": "#hexcolor" }
        let pixels = {};

        // Hover highlight
        let hoverPixel = null;

        // WebSocket connection
        let ws = null;
        let myName = "";

        // Cooldown realtime tracking
        let lastPlaceTime = 0;
        let cooldownInterval = null;
        let isOnCooldown = false;

        // Helper: update cooldown UI every frame (or via interval)
        function updateCooldownUI() {
            if (!isOnCooldown) {
                if (cooldownDiv.innerText !== "✨ READY") {
                    cooldownDiv.innerText = "✨ READY";
                    cooldownDiv.className = "ready";
                }
                return;
            }

            const now = Date.now();
            const elapsed = now - lastPlaceTime;
            const remaining = Math.max(0, COOLDOWN_MS - elapsed);
            if (remaining <= 0) {
                // cooldown finished
                isOnCooldown = false;
                if (cooldownInterval) {
                    clearInterval(cooldownInterval);
                    cooldownInterval = null;
                }
                cooldownDiv.innerText = "✨ READY";
                cooldownDiv.className = "ready";
                return;
            }

            const secondsLeft = Math.ceil(remaining / 1000);
            cooldownDiv.innerText = `⏳ ${secondsLeft}s`;
            cooldownDiv.className = "wait";
        }

        // start cooldown timer (visual + state)
        function startCooldownTimer() {
            if (cooldownInterval) clearInterval(cooldownInterval);
            isOnCooldown = true;
            lastPlaceTime = Date.now();
            updateCooldownUI();
            // update every 200ms for smooth countdown
            cooldownInterval = setInterval(() => {
                updateCooldownUI();
                // auto clear when remaining <=0
                const now = Date.now();
                if (now - lastPlaceTime >= COOLDOWN_MS) {
                    if (cooldownInterval) clearInterval(cooldownInterval);
                    cooldownInterval = null;
                    isOnCooldown = false;
                    cooldownDiv.innerText = "✨ READY";
                    cooldownDiv.className = "ready";
                }
            }, 200);
        }

        // check if user can place pixel (no cooldown)
        function canPlacePixel() {
            if (isOnCooldown) {
                const elapsed = Date.now() - lastPlaceTime;
                return elapsed >= COOLDOWN_MS;
            }
            return true;
        }

        // ----- Drawing engine -----
        function drawGrid() {
            ctx.strokeStyle = "rgba(255, 255, 255, 0.2)";
            ctx.lineWidth = 1;
            const startX = offsetX;
            const startY = offsetY;
            const step = BASE_PIXEL * scale;
            const maxX = SIZE * step + offsetX;
            const maxY = SIZE * step + offsetY;

            // vertical lines
            for (let i = 0; i <= SIZE; i++) {
                const x = i * step + offsetX;
                ctx.beginPath();
                ctx.moveTo(x, startY);
                ctx.lineTo(x, maxY);
                ctx.stroke();
            }
            // horizontal lines
            for (let i = 0; i <= SIZE; i++) {
                const y = i * step + offsetY;
                ctx.beginPath();
                ctx.moveTo(startX, y);
                ctx.lineTo(maxX, y);
                ctx.stroke();
            }
        }

        function drawAllPixels() {
            const step = BASE_PIXEL * scale;
            for (let key in pixels) {
                const [x, y] = key.split("_").map(Number);
                const color = pixels[key];
                ctx.fillStyle = color;
                ctx.fillRect(
                    x * step + offsetX,
                    y * step + offsetY,
                    step,
                    step
                );
            }
        }

        function drawHover() {
            if (!hoverPixel) return;
            const { x, y } = hoverPixel;
            if (x < 0 || x >= SIZE || y < 0 || y >= SIZE) return;
            const step = BASE_PIXEL * scale;
            ctx.save();
            ctx.strokeStyle = "#FFD966";
            ctx.lineWidth = Math.max(2, 3 / scale);
            ctx.shadowBlur = 0;
            ctx.strokeRect(
                x * step + offsetX,
                y * step + offsetY,
                step,
                step
            );
            // inner bright outline
            ctx.strokeStyle = "white";
            ctx.lineWidth = Math.max(1, 2 / scale);
            ctx.strokeRect(
                x * step + offsetX + 1,
                y * step + offsetY + 1,
                step - 2,
                step - 2
            );
            ctx.restore();
        }

        function draw() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawAllPixels();
            drawGrid();
            drawHover();
        }

        // convert screen to grid coordinates
        function getPixelCoordFromScreen(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const canvasX = (clientX - rect.left) * (canvas.width / rect.width);
            const canvasY = (clientY - rect.top) * (canvas.height / rect.height);
            const gridX = Math.floor((canvasX - offsetX) / (BASE_PIXEL * scale));
            const gridY = Math.floor((canvasY - offsetY) / (BASE_PIXEL * scale));
            if (gridX >= 0 && gridX < SIZE && gridY >= 0 && gridY < SIZE) {
                return { x: gridX, y: gridY };
            }
            return null;
        }

        // ----- WebSocket handlers & sync -----
        function connectWebSocket() {
            const protocol = location.protocol === "https:" ? "wss:" : "ws:";
            const wsUrl = `${protocol}//${location.host}`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log("[WS] Connected to server");
                // optional: after connection, we can re-sync but server usually sends init
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === "init") {
                        // full canvas state from server
                        pixels = data.canvas || {};
                        draw();
                    } 
                    else if (data.type === "update") {
                        // single pixel update: { pixel: "x_y", color: "#hex", name: "player" }
                        const pixelKey = data.pixel;
                        if (pixelKey && data.color) {
                            pixels[pixelKey] = data.color;
                            draw();
                            // show temporary name tag (floating name effect)
                            if (data.name) {
                                showNameTag(pixelKey, data.name);
                            }
                        }
                    }
                    else if (data.type === "error") {
                        console.warn("[Server error]", data.message);
                        // optional: display server feedback
                        if (data.message && data.message.includes("cooldown")) {
                            const tempMsg = document.getElementById("cooldown");
                            tempMsg.style.background = "#aa2e2e";
                            setTimeout(() => {
                                if (!isOnCooldown) tempMsg.style.background = "";
                            }, 800);
                        }
                    }
                } catch(e) { console.error("WS parse error", e); }
            };

            ws.onclose = () => {
                console.log("[WS] Disconnected, reconnecting in 2s...");
                setTimeout(connectWebSocket, 2000);
            };

            ws.onerror = (err) => {
                console.error("WebSocket error", err);
            };
        }

        // show temporary username above pixel (graceful)
        let activeNameTimeout = null;
        function showNameTag(pixelKey, name) {
            if (!pixelKey) return;
            const [x, y] = pixelKey.split("_").map(Number);
            const step = BASE_PIXEL * scale;
            const posX = x * step + offsetX;
            const posY = y * step + offsetY;

            ctx.save();
            ctx.font = `bold ${Math.max(12, 14 * (scale ** 0.8))}px "Segoe UI", "Inter"`;
            ctx.shadowBlur = 4;
            ctx.shadowColor = "black";
            ctx.fillStyle = "#ffffff";
            ctx.shadowOffsetX = 1;
            ctx.shadowOffsetY = 1;
            ctx.fillText(name, posX + 4, posY + (step * 0.7));
            ctx.fillStyle = "#FFD966";
            ctx.font = `bold ${Math.max(12, 14 * (scale ** 0.8))}px "Segoe UI"`;
            ctx.fillText(name, posX + 3, posY + (step * 0.7) - 1);
            ctx.restore();

            // redraw after 1.2 sec to remove text overlay
            if (activeNameTimeout) clearTimeout(activeNameTimeout);
            activeNameTimeout = setTimeout(() => {
                draw();
            }, 1100);
        }

        // place pixel (with client cooldown validation + server request)
        function tryPlacePixel(clientX, clientY) {
            // 1) check client cooldown FIRST (fully removes cooldown restriction)
            if (!canPlacePixel()) {
                // show temporary visual feedback
                cooldownDiv.style.transform = "scale(0.98)";
                setTimeout(() => { if(cooldownDiv) cooldownDiv.style.transform = ""; }, 200);
                return false;
            }

            const coord = getPixelCoordFromScreen(clientX, clientY);
            if (!coord) return false;

            const { x, y } = coord;
            const pixelKey = `${x}_${y}`;
            const selectedColor = colorPicker.value;

            // optimistic local update? better to rely on server echo for consistency
            // but we show immediate feedback? Actually server will broadcast update.
            // we also apply client cooldown timer immediately to prevent spam BEFORE server response
            // This ensures smooth UX and respects 5s rule completely.
            
            // start cooldown on client (blocks further placements for 5 sec)
            startCooldownTimer();

            // send placement to server
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: "place",
                    pixel: pixelKey,
                    color: selectedColor,
                    name: myName
                }));
            } else {
                console.warn("WebSocket not ready, pixel not sent");
                // if offline, revert cooldown? but better keep cooldown to avoid spam
                // but we'll notify user
                cooldownDiv.innerText = "⚠️ offline";
                setTimeout(() => updateCooldownUI(), 1500);
            }
            return true;
        }

        // ----- Canvas interactions: zoom, pan, click -----
        function initCanvasEvents() {
            // click to place pixel
            canvas.addEventListener("click", (e) => {
                e.preventDefault();
                tryPlacePixel(e.clientX, e.clientY);
            });

            // touch support for mobile
            canvas.addEventListener("touchstart", (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                if (touch) tryPlacePixel(touch.clientX, touch.clientY);
            }, { passive: false });

            // hover (mousemove)
            canvas.addEventListener("mousemove", (e) => {
                const coord = getPixelCoordFromScreen(e.clientX, e.clientY);
                if (coord && coord.x >= 0 && coord.x < SIZE && coord.y >=0 && coord.y < SIZE) {
                    hoverPixel = coord;
                } else {
                    hoverPixel = null;
                }
                draw();
            });

            canvas.addEventListener("mouseleave", () => {
                hoverPixel = null;
                draw();
            });

            // Zoom with wheel
            canvas.addEventListener("wheel", (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                const canvasMouseX = mouseX * (canvas.width / rect.width);
                const canvasMouseY = mouseY * (canvas.height / rect.height);
                
                const oldScale = scale;
                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                let newScale = scale * delta;
                newScale = Math.min(6, Math.max(0.4, newScale));
                if (newScale === scale) return;
                
                // adjust offset to keep pixel under cursor
                const worldX = (canvasMouseX - offsetX) / (BASE_PIXEL * oldScale);
                const worldY = (canvasMouseY - offsetY) / (BASE_PIXEL * oldScale);
                scale = newScale;
                offsetX = canvasMouseX - worldX * (BASE_PIXEL * scale);
                offsetY = canvasMouseY - worldY * (BASE_PIXEL * scale);
                
                draw();
            });

            // Pan with drag (mouse + touch)
            let isDragging = false;
            let dragStartX = 0, dragStartY = 0;
            let panStartOffsetX = 0, panStartOffsetY = 0;

            canvas.addEventListener("mousedown", (e) => {
                if (e.button === 0) {
                    isDragging = true;
                    dragStartX = e.clientX;
                    dragStartY = e.clientY;
                    panStartOffsetX = offsetX;
                    panStartOffsetY = offsetY;
                    canvas.style.cursor = "grabbing";
                    e.preventDefault();
                }
            });
            window.addEventListener("mousemove", (e) => {
                if (!isDragging) return;
                const dx = e.clientX - dragStartX;
                const dy = e.clientY - dragStartY;
                offsetX = panStartOffsetX + dx;
                offsetY = panStartOffsetY + dy;
                draw();
            });
            window.addEventListener("mouseup", () => {
                isDragging = false;
                canvas.style.cursor = "grab";
            });

            // Touch pan
            let touchPanActive = false;
            let touchStartPos = { x: 0, y: 0 };
            let touchStartOffset = { x: 0, y: 0 };
            canvas.addEventListener("touchstart", (e) => {
                if (e.touches.length === 1) {
                    touchPanActive = true;
                    const touch = e.touches[0];
                    touchStartPos.x = touch.clientX;
                    touchStartPos.y = touch.clientY;
                    touchStartOffset.x = offsetX;
                    touchStartOffset.y = offsetY;
                    e.preventDefault();
                }
            });
            canvas.addEventListener("touchmove", (e) => {
                if (touchPanActive && e.touches.length === 1) {
                    const touch = e.touches[0];
                    const dx = touch.clientX - touchStartPos.x;
                    const dy = touch.clientY - touchStartPos.y;
                    offsetX = touchStartOffset.x + dx;
                    offsetY = touchStartOffset.y + dy;
                    draw();
                    e.preventDefault();
                } else if (e.touches.length === 2) {
                    // pinch zoom logic
                    if (touchPanActive) touchPanActive = false;
                    e.preventDefault();
                }
            });
            canvas.addEventListener("touchend", () => {
                touchPanActive = false;
            });

            // pinch zoom for touch
            let initialPinchDist = null;
            let pinchStartScale = 1;
            let pinchStartOffset = { x: 0, y: 0 };
            canvas.addEventListener("touchmove", (e) => {
                if (e.touches.length === 2) {
                    const touch1 = e.touches[0];
                    const touch2 = e.touches[1];
                    const dx = touch1.clientX - touch2.clientX;
                    const dy = touch1.clientY - touch2.clientY;
                    const distance = Math.hypot(dx, dy);
                    if (initialPinchDist === null) {
                        initialPinchDist = distance;
                        pinchStartScale = scale;
                        // get center point
                        const centerX = (touch1.clientX + touch2.clientX) / 2;
                        const centerY = (touch1.clientY + touch2.clientY) / 2;
                        const rect = canvas.getBoundingClientRect();
                        const canvasX = (centerX - rect.left) * (canvas.width / rect.width);
                        const canvasY = (centerY - rect.top) * (canvas.height / rect.height);
                        pinchStartOffset = { x: canvasX, y: canvasY };
                    } else {
                        const newScale = pinchStartScale * (distance / initialPinchDist);
                        const clampedScale = Math.min(6, Math.max(0.4, newScale));
                        if (clampedScale !== scale) {
                            const oldScale = scale;
                            const worldX = (pinchStartOffset.x - offsetX) / (BASE_PIXEL * oldScale);
                            const worldY = (pinchStartOffset.y - offsetY) / (BASE_PIXEL * oldScale);
                            scale = clampedScale;
                            offsetX = pinchStartOffset.x - worldX * (BASE_PIXEL * scale);
                            offsetY = pinchStartOffset.y - worldY * (BASE_PIXEL * scale);
                            draw();
                        }
                    }
                    e.preventDefault();
                } else {
                    initialPinchDist = null;
                }
            });
            canvas.addEventListener("touchend", () => {
                initialPinchDist = null;
            });
        }

        // window resize handler: keep canvas fullscreen & recenter if needed
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // optional: keep center of board visible if offset out of bounds
            const totalSize = SIZE * BASE_PIXEL * scale;
            const minOffsetX = canvas.width - totalSize;
            const minOffsetY = canvas.height - totalSize;
            offsetX = Math.min(100, Math.max(offsetX, minOffsetX - 50));
            offsetY = Math.min(100, Math.max(offsetY, minOffsetY - 50));
            draw();
        }

        // ----- get username and restore any state-----
        function initUser() {
            let stored = localStorage.getItem("rplace_username");
            if (stored) {
                myName = stored;
            } else {
                myName = prompt("🎨 Enter your artist name:", "Anon_" + Math.floor(Math.random()*1000));
                if (!myName || myName.trim() === "") myName = "Guest_" + Math.floor(Math.random()*999);
                myName = myName.substring(0, 20);
                localStorage.setItem("rplace_username", myName);
            }
        }

        // load dummy init pixels if server doesn't respond? but we rely on server init.
        // just to have something if server fails: generate empty grid
        function ensureMinimalCanvas() {
            if (Object.keys(pixels).length === 0) {
                // optional: placeholder grey but server will override anyway
                for (let i=0;i<SIZE;i++) {
                    for(let j=0;j<SIZE;j++) {
                        let key = `${i}_${j}`;
                        if(!pixels[key]) pixels[key] = "#2d2f36";
                    }
                }
                draw();
            }
        }

        // auto cooldown update loop (draw also updates frame)
        function animationLoop() {
            updateCooldownUI();
            requestAnimationFrame(animationLoop);
        }
        
        // start everything
        function bootstrap() {
            initUser();
            resizeCanvas();
            initCanvasEvents();
            connectWebSocket();
            // fallback timer for smooth cooldown sync
            animationLoop();
            window.addEventListener("resize", () => {
                resizeCanvas();
                draw();
            });
            // periodic redraw to keep UI fresh (hover might glitch)
            setInterval(() => draw(), 200);
        }

        bootstrap();
    })();
</script>
</body>
</html>
